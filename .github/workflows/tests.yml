name: DARTRIX FLINT EDGE — Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || true

    - name: Run FLINT tests
      run: python tests/test_flint.py

    - name: Run TES tests
      run: python tests/test_tes.py

    - name: Run WolfGuardian tests
      run: python tests/test_wolf.py

    - name: Run SensorOps tests
      run: python tests/test_sensorops.py

    - name: Run Pipeline integration tests
      run: python tests/test_pipeline.py

    - name: Run basic demo
      run: python src/app.py --demo basic

    - name: Run Cold Chain demo
      run: python demos/cold_chain_demo.py

    - name: Run Security demo
      run: python demos/replay_attack_demo.py